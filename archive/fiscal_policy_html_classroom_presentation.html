<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Fiscal Policy — HTML Classroom Presentation</title>
<style>
:root{
  --bg:#07111f; --bg2:#0d1b2f; --ink:#f5f7fb; --muted:#a9b8ce; --gold:#ffd166; --cyan:#56d8ff; --green:#7ef0b5; --rose:#ff6b8a; --violet:#b79cff; --card:rgba(255,255,255,.09); --line:rgba(255,255,255,.16);
  --shadow: 0 28px 90px rgba(0,0,0,.42);
}
*{box-sizing:border-box} html,body{height:100%;margin:0;background:var(--bg);color:var(--ink);font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;overflow:hidden}
body:before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 20% 12%,rgba(86,216,255,.18),transparent 28%),radial-gradient(circle at 82% 22%,rgba(255,209,102,.16),transparent 27%),radial-gradient(circle at 54% 90%,rgba(183,156,255,.15),transparent 30%),linear-gradient(135deg,#07111f,#0d1428 42%,#07111f);z-index:-3}
body:after{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px, transparent 1px);background-size:42px 42px;mask-image:radial-gradient(circle at center,black,transparent 78%);z-index:-2}
#deck{height:100%;width:100%;position:relative}
.slide{position:absolute;inset:0;display:none;padding:5.5vh 6.2vw 6vh 6.2vw;overflow:hidden}
.slide.active{display:grid;grid-template-rows:auto 1fr auto;gap:2.2vh;animation:slideIn .45s ease both}
@keyframes slideIn{from{opacity:0;transform:translateY(18px) scale(.985)}to{opacity:1;transform:none}}
.topline{display:flex;align-items:center;justify-content:space-between;gap:24px;color:var(--muted);font-size:1.03vw;letter-spacing:.06em;text-transform:uppercase}
.badge{display:inline-flex;gap:10px;align-items:center;padding:.65em 1em;border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:999px;backdrop-filter:blur(8px)}
.badge:before{content:"";width:.72em;height:.72em;background:var(--cyan);border-radius:50%;box-shadow:0 0 18px var(--cyan)}
.count{font-variant-numeric:tabular-nums;color:#d9e2f1}
.content{min-height:0;display:grid;grid-template-columns:1.08fr .92fr;align-items:center;gap:4vw}
.content.full{grid-template-columns:1fr}
h1{font-size:clamp(42px,5.2vw,96px);line-height:.93;margin:0;letter-spacing:-.055em}
h2{font-size:clamp(34px,4.1vw,76px);line-height:.98;margin:.1em 0 .25em;letter-spacing:-.045em}
h3{font-size:clamp(22px,2.1vw,42px);line-height:1.08;margin:0 0 .65em;letter-spacing:-.025em}
p,.text{font-size:clamp(18px,1.55vw,31px);line-height:1.35;color:#dbe7f6;margin:0}
.lead{font-size:clamp(22px,2.2vw,40px);line-height:1.18;color:#f5f7fb;margin:.2em 0 .9em;max-width:1050px}
.sub{font-size:clamp(22px,2.6vw,52px);color:var(--cyan);font-weight:850;line-height:1.03;margin:0 0 .3em}
.kicker{font-size:clamp(19px,1.9vw,36px);color:var(--gold);font-weight:700;margin-top:1.2em}
.footer{font-size:clamp(15px,1.18vw,24px);color:var(--muted);display:flex;justify-content:space-between;align-items:end;gap:20px}
.prompt{display:inline-block;margin-top:1.2em;padding:1em 1.15em;background:linear-gradient(135deg,rgba(255,209,102,.15),rgba(86,216,255,.09));border:1px solid rgba(255,209,102,.28);border-radius:22px;color:#fff;font-weight:750;font-size:clamp(17px,1.45vw,30px)}
.cardgrid{display:grid;gap:1.1rem;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));width:100%}
.card{position:relative;background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.045));border:1px solid var(--line);border-radius:28px;padding:1.35rem 1.45rem;box-shadow:var(--shadow);overflow:hidden}
.card:after{content:"";position:absolute;right:-44px;top:-44px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(86,216,255,.25),transparent 68%)}
.card .num{font-size:clamp(34px,4vw,72px);font-weight:950;color:var(--gold);line-height:.9;letter-spacing:-.05em}
.card b{display:block;font-size:clamp(21px,2vw,38px);line-height:1.05;margin-bottom:.3em;color:#fff}
.card span{font-size:clamp(16px,1.25vw,25px);line-height:1.33;color:#ccdaee}
.termBox{border-left:8px solid var(--cyan);padding:1.4rem 1.6rem;background:rgba(86,216,255,.08);border-radius:0 28px 28px 0;margin:1rem 0;box-shadow:var(--shadow)}
.termBox b{font-size:clamp(26px,2.5vw,48px);color:#fff;display:block;margin-bottom:.45rem}
.formula{font-size:clamp(22px,2.2vw,42px);font-weight:850;color:var(--gold);margin-top:1rem}
.choices{display:grid;gap:1rem;margin-top:1.4rem}
.choice{padding:1rem 1.25rem;border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.07);font-size:clamp(19px,1.55vw,31px);font-weight:750;color:#fff}
.answerBox{padding:1.4rem 1.6rem;border-radius:30px;background:linear-gradient(135deg,rgba(126,240,181,.18),rgba(86,216,255,.10));border:1px solid rgba(126,240,181,.28);box-shadow:var(--shadow)}
.answerBox .big{font-size:clamp(34px,3.5vw,72px);font-weight:950;color:var(--green);letter-spacing:-.045em;margin-bottom:.35em}
.steps{display:grid;gap:1rem;margin-top:1.2rem}
.step{display:grid;grid-template-columns:auto 1fr;gap:1rem;align-items:start;background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:24px;padding:1rem 1.1rem}
.step .label{min-width:3rem;text-align:center;font-weight:950;color:#09111f;background:var(--gold);border-radius:999px;padding:.35rem .7rem;font-size:clamp(18px,1.3vw,28px)}
.step .desc{font-size:clamp(18px,1.45vw,29px);line-height:1.27;color:#edf4ff}
.splitCols{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
ul.clean{list-style:none;padding:0;margin:0;display:grid;gap:.9rem} ul.clean li{font-size:clamp(18px,1.35vw,28px);line-height:1.28;padding-left:1.6em;position:relative;color:#dbe7f6} ul.clean li:before{content:"";position:absolute;left:0;top:.44em;width:.75em;height:.75em;border-radius:50%;background:var(--cyan);box-shadow:0 0 18px rgba(86,216,255,.4)}
.visual{min-height:52vh;display:flex;align-items:center;justify-content:center;position:relative}
.vizPanel{width:min(100%,680px);aspect-ratio:1.08;background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.045));border:1px solid var(--line);border-radius:36px;box-shadow:var(--shadow);position:relative;overflow:hidden;padding:28px}
.vizPanel svg{width:100%;height:100%;display:block}
.heroGraphic{width:min(100%,700px);aspect-ratio:1;border-radius:50%;position:relative;background:radial-gradient(circle,rgba(86,216,255,.19),transparent 58%);display:grid;place-items:center}
.heroGraphic .orbit{position:absolute;border:1px solid rgba(255,255,255,.16);border-radius:50%;animation:spin 28s linear infinite} .heroGraphic .o1{inset:8%} .heroGraphic .o2{inset:20%;animation-direction:reverse} .heroGraphic .o3{inset:32%}
.coin{position:absolute;width:84px;height:84px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),#ff9f43);color:#111827;font-weight:950;font-size:44px;box-shadow:0 14px 40px rgba(255,209,102,.32)}
.coin.c1{top:14%;right:18%} .coin.c2{bottom:17%;left:12%;transform:scale(.78)} .coin.c3{bottom:25%;right:16%;transform:scale(.62)}
@keyframes spin{to{transform:rotate(360deg)}}
.axis{stroke:rgba(255,255,255,.55);stroke-width:3} .gridline{stroke:rgba(255,255,255,.12);stroke-width:1} .curve{fill:none;stroke-width:7;stroke-linecap:round;filter:drop-shadow(0 8px 14px rgba(0,0,0,.25));stroke-dasharray:650;stroke-dashoffset:650;animation:draw 1.5s ease forwards} .curve.gold{stroke:var(--gold)} .curve.cyan{stroke:var(--cyan)} .curve.green{stroke:var(--green)} .curve.rose{stroke:var(--rose)}
@keyframes draw{to{stroke-dashoffset:0}}
.bar{rx:10;animation:growY 1.1s ease forwards;transform-origin:bottom} @keyframes growY{from{transform:scaleY(.05);opacity:.5}to{transform:scaleY(1);opacity:1}}
.arrow{stroke:var(--gold);stroke-width:5;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-dasharray:300;stroke-dashoffset:300;animation:draw 1.4s ease forwards}
.flowRow{display:flex;gap:1rem;align-items:stretch;justify-content:center;flex-wrap:wrap;margin-top:1.3rem}
.flowChip{position:relative;min-width:180px;max-width:260px;flex:1;padding:1.1rem 1rem;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid var(--line);font-size:clamp(17px,1.3vw,27px);font-weight:850;text-align:center;color:#fff}
.flowChip:not(:last-child):after{content:"→";position:absolute;right:-1.05rem;top:50%;transform:translateY(-50%);color:var(--gold);font-size:2rem;z-index:3}
.sectionTitle{white-space:pre-line;font-size:clamp(58px,8vw,150px);line-height:.86;letter-spacing:-.07em;background:linear-gradient(135deg,#fff,var(--cyan),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.sectionLayout{grid-template-columns:.95fr 1.05fr}
.help{position:fixed;right:18px;bottom:18px;z-index:50;font-size:12px;color:rgba(255,255,255,.62);background:rgba(0,0,0,.25);padding:8px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.12)}
#progress{position:fixed;left:0;right:0;bottom:0;height:5px;background:rgba(255,255,255,.08);z-index:60} #progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--gold));transition:width .25s}
#notes{display:none;position:fixed;left:4vw;right:4vw;bottom:5vh;z-index:70;background:rgba(3,10,20,.92);border:1px solid var(--line);border-radius:20px;padding:1rem 1.2rem;box-shadow:var(--shadow);font-size:18px;color:#dbe7f6} #notes.show{display:block}
@media(max-width:900px){.content{grid-template-columns:1fr;gap:2vh}.visual{min-height:32vh}.splitCols{grid-template-columns:1fr}.topline{font-size:13px}}
@media print{html,body{height:auto;overflow:auto;background:white;color:black} body:before,body:after,#progress,.help,#notes{display:none!important} .slide{position:relative;display:block!important;height:100vh;page-break-after:always;background:#07111f;color:#f5f7fb;overflow:hidden} .slide.active{display:block}}
</style>
</head>

.", "visual": "government"}, {"type": "cards", "title": "Economy: demand, inflation and inequality", "eyebrow": "Tax impact", "cards": [["Total demand", "higher taxes can reduce spending"], ["Inflation", "lower demand may reduce demand-pull inflation"], ["Inequality", "progressive taxes can redistribute income"]], "visual": "economy"}, {"type": "quiz", "title": "Scenario practice: VAT on luxury cars", "eyebrow": "Tax impact", "question": "The government raises VAT on luxury cars. Write one likely effect on each stakeholder.", "choices": ["consumers（消费者）", "producers（生产者）", "government（政府）", "economy（经济）"], "prompt": "Use “may” unless the effect is certain.", "visual": "luxuryCars"}, {"type": "answer", "title": "Developed stakeholder answers", "eyebrow": "Tax impact", "steps": [["Consumers", "higher final price, so some may buy fewer luxury cars"], ["Producers", "sales may fall; profit may fall if firms absorb some tax"], ["Government", "tax revenue may rise if enough cars are still bought"], ["Economy", "total demand may fall slightly; imports may fall if cars are imported"]], "cue": "Developed answers use chains of reasoning, not isolated statements.", "visual": "stakeholders"}, {"type": "section", "title": "Fiscal\npolicy", "eyebrow": "Section", "subtitle": "Tax and spending decisions affect the budget balance and macroeconomic aims.", "visual": "sectionFiscal"}, {"type": "term", "title": "Fiscal policy", "eyebrow": "Key term", "term": "fiscal policy（财政政策）", "definition": "The use of government spending and taxation to influence economic activity / total demand and achieve macroeconomic aims.", "examples": ["government spending（政府支出）", "taxation（税收）"], "formula": "Main instruments", "visual": "fiscal"}, {"type": "flow", "title": "Expansionary fiscal policy", "eyebrow": "Fiscal policy", "nodes": [["Increase government spending", "and/or reduce taxation", "total demand rises", "output and employment may rise"]], "footer": "Use when growth is low, unemployment is rising or there is spare capacity.", "visual": "expansionary"}, {"type": "flow", "title": "Contractionary fiscal policy", "eyebrow": "Fiscal policy", "nodes": [["Reduce government spending", "and/or increase taxation", "total demand falls", "inflationary pressure may fall"]], "footer": "Use when demand-pull inflation is high or the economy risks overheating.", "visual": "contractionary"}, {"type": "cards", "title": "Budget balance terms", "eyebrow": "Fiscal policy", "lead": "Budget balance = government revenue − government expenditure", "cards": [["Budget deficit（预算赤字）", "spending exceeds revenue"], ["Budget surplus（预算盈余）", "revenue exceeds spending"], ["Balanced budget（预算平衡）", "revenue equals spending"]], "visual": "balanceTerms"}, {"type": "quiz", "title": "Budget calculation practice", "eyebrow": "Fiscal policy", "question": "Government revenue = $780m. Government expenditure = $910m. Calculate the budget balance.", "choices": ["Show working: revenue − expenditure = ___", "Label it: deficit, surplus or balanced"], "prompt": "A correct answer needs the number and the label.", "visual": "budgetPractice"}, {"type": "answer", "title": "Budget calculation answer", "eyebrow": "Fiscal policy", "answer": "$130m deficit", "body": "$780m − $910m = −$130m. The government spent $130m more than it received in revenue.", "cue": "Exam cue: show the mechanism, not only the final answer.", "visual": "budgetDeficit"}, {"type": "cards", "title": "Fiscal policy choices depend on the aim", "eyebrow": "Fiscal policy", "cards": [["Economic growth", "increase spending or cut taxes to raise total demand"], ["Employment", "spend on infrastructure or cut taxes to encourage hiring"], ["Stable prices", "raise taxes or reduce spending to lower demand-pull inflation"], ["Redistribution", "progressive taxes and benefits can reduce inequality"]], "footer": "Balance of payments link: lower demand can reduce imports, but growth may increase imports.", "visual": "policyAims"}, {"type": "split", "title": "One fiscal aim can conflict with another", "eyebrow": "Fiscal policy", "leftTitle": "Expansionary risk", "left": ["may raise growth and employment", "may increase inflation", "may increase imports"], "rightTitle": "Contractionary risk", "right": ["may reduce inflation", "may reduce growth", "may increase unemployment"], "visual": "conflict"}, {"type": "quiz", "title": "Mini case: choose the policy package", "eyebrow": "Fiscal policy", "question": "Economy X has rising unemployment, low growth and stable inflation. Which package is best?", "choices": ["A. cut spending and raise taxes", "B. raise spending and/or cut taxes", "C. keep taxes and spending unchanged"], "prompt": "Write: “I choose ___ because ___, which may lead to ___.”", "visual": "miniCase"}, {"type": "flow", "title": "Expansionary policy fits Economy X", "eyebrow": "Fiscal policy", "nodes": [["Lower taxes raise disposable income", "consumers may spend more", "firms produce more", "employment may rise"]], "footer": "Evaluation point: this policy may increase the budget deficit.", "visual": "expansionary"}, {"type": "exam", "title": "Exam-style question [4]", "eyebrow": "Exam practice", "question": "Explain how a reduction in taxation may help a government achieve economic growth.", "keywords": ["disposable income", "total demand", "output", "employment"], "prompt": "Write two linked chains. Aim for four clear points.", "visual": "exam"}, {"type": "answer", "title": "Model 4-mark answer", "eyebrow": "Exam practice", "steps": [["1", "A reduction in income tax raises disposable income."], ["2", "Consumers may increase spending on goods and services."], ["3", "This increases total demand and encourages firms to raise output."], ["4", "Higher output means economic growth and may increase employment."]], "visual": "modelAnswer"}, {"type": "cards", "title": "Exam answer discipline", "eyebrow": "Exam practice", "cards": [["Policy", "name the fiscal change clearly"], ["Mechanism", "show how it affects demand, output or incentives"], ["Aim", "link the chain to growth, employment, prices or redistribution"]], "footer": "Use “may” because effects depend on size, timing and context.", "visual": "discipline"}, {"type": "quiz", "title": "Exit ticket", "eyebrow": "Review", "choices": ["1. Define fiscal policy in one sentence.", "2. Classify a tariff using two labels.", "3. Calculate: revenue $500m, spending $460m."], "prompt": "Each answer must use a key term accurately.", "visual": "exit"}, {"type": "answer", "title": "Exit answers", "eyebrow": "Review", "steps": [["1", "Fiscal policy uses government spending and taxation to influence economic activity / total demand and achieve macroeconomic aims."], ["2", "A tariff is an indirect tax because it is a tax on imports / spending on goods."], ["3", "$500m − $460m = $40m surplus."]], "visual": "exitAnswer"}];
let idx = 0;
const deck = document.getElementById('deck');
const notes = document.getElementById('notes');
function esc(s){ return String(s??'').replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function top(s,i){return `<div class="topline"><span class="badge">${esc(s.eyebrow||'Economics')}</span><span class="count">${String(i+1).padStart(2,'0')} / ${String(slides.length).padStart(2,'0')}</span></div>`}
function visual(kind){
  if(kind==='hero') return `<div class="heroGraphic"><div class="orbit o1"></div><div class="orbit o2"></div><div class="orbit o3"></div><div class="coin c1">$</div><div class="coin c2">%</div><div class="coin c3">£</div><svg viewBox="0 0 500 500"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="var(--gold)"/></marker></defs><path class="curve cyan" d="M110 340 C170 180 300 360 390 145"/><path class="curve gold" d="M130 280 C225 310 250 170 375 230"/><text x="250" y="265" text-anchor="middle" font-size="76" font-weight="950" fill="white">tax</text></svg></div>`;
  let svg = `<svg viewBox="0 0 520 520"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="var(--gold)"/></marker></defs><line class="gridline" x1="70" y1="90" x2="470" y2="90"/><line class="gridline" x1="70" y1="180" x2="470" y2="180"/><line class="gridline" x1="70" y1="270" x2="470" y2="270"/><line class="gridline" x1="70" y1="360" x2="470" y2="360"/><line class="axis" x1="78" y1="430" x2="460" y2="430"/><line class="axis" x1="78" y1="430" x2="78" y2="70"/>`;
  if(['demand','taxchoice','indirect','consumers','economy','contractionary','budgetPractice'].includes(kind)) svg += `<path class="curve cyan" d="M115 120 C185 160 280 260 420 390"/><path class="curve rose" d="M130 370 C210 260 280 170 420 105"/><path class="arrow" d="M250 190 C282 218 306 245 330 282"/>`;
  else if(['budget','budgetBars','budgetDeficit','balanceTerms','netRevenue','netRevenueAnswer'].includes(kind)) svg += `<rect class="bar" x="135" y="164" width="88" height="266" fill="var(--cyan)"/><rect class="bar" x="300" y="94" width="88" height="336" fill="var(--rose)"/><text x="179" y="465" text-anchor="middle" fill="white" font-weight="800" font-size="24">revenue</text><text x="344" y="465" text-anchor="middle" fill="white" font-weight="800" font-size="24">spending</text><text x="258" y="78" text-anchor="middle" fill="var(--gold)" font-weight="950" font-size="44">deficit</text>`;
  else if(['progressive'].includes(kind)) svg += `<rect class="bar" x="135" y="310" width="88" height="120" fill="var(--cyan)"/><rect class="bar" x="300" y="160" width="88" height="270" fill="var(--gold)"/><path class="arrow" d="M190 250 C250 160 290 130 355 105"/>`;
  else if(['regressive'].includes(kind)) svg += `<rect class="bar" x="135" y="210" width="88" height="220" fill="var(--gold)"/><rect class="bar" x="300" y="350" width="88" height="80" fill="var(--cyan)"/><text x="260" y="135" text-anchor="middle" fill="white" font-weight="900" font-size="42">same tax, unequal burden</text>`;
  else if(['proportional'].includes(kind)) svg += `<rect class="bar" x="135" y="260" width="88" height="170" fill="var(--green)"/><rect class="bar" x="300" y="260" width="88" height="170" fill="var(--green)"/><text x="260" y="140" text-anchor="middle" fill="white" font-weight="900" font-size="46">15% = 15%</text>`;
  else if(['expansionary','miniCase','policyAims'].includes(kind)) svg += `<path class="curve green" d="M110 385 C170 335 235 265 300 205 C350 160 395 130 430 105"/><path class="arrow" d="M250 320 C290 270 320 225 360 180"/><text x="270" y="90" text-anchor="middle" fill="var(--green)" font-weight="950" font-size="42">demand ↑</text>`;
  else if(['sectionClass','sectionGood','sectionFiscal','fiscal','publicGoods','direct','classFlow','twoDecisions','classificationAnswer','principles','implementation','producers','government','luxuryCars','stakeholders','conflict','exam','modelAnswer','discipline','exit','exitAnswer','targets','map','tax','matching','matchingAnswer'].includes(kind)) svg += `<circle cx="260" cy="250" r="145" fill="none" stroke="rgba(86,216,255,.4)" stroke-width="28"/><circle cx="260" cy="250" r="95" fill="none" stroke="rgba(255,209,102,.42)" stroke-width="28"/><path class="curve cyan" d="M125 350 C210 105 310 415 425 150"/><path class="curve gold" d="M120 205 C210 310 310 130 420 295"/>`;
  svg += `</svg>`;
  return `<div class="vizPanel">${svg}</div>`;
}
function cardGrid(cards){ return `<div class="cardgrid">${(cards||[]).map((c,i)=>`<div class="card"><b>${esc(c[0])}</b><span>${esc(c[1])}</span></div>`).join('')}</div>` }
function choices(list){ return `<div class="choices">${(list||[]).map(x=>`<div class="choice">${esc(x)}</div>`).join('')}</div>` }
function steps(list){ return `<div class="steps">${(list||[]).map(x=>`<div class="step"><div class="label">${esc(x[0])}</div><div class="desc">${esc(x[1])}</div></div>`).join('')}</div>` }
function flow(nodes){ const arr=(nodes&&nodes[0])||[]; return `<div class="flowRow">${arr.map(x=>`<div class="flowChip">${esc(x)}</div>`).join('')}</div>` }
function renderSlide(s,i){
 let main=''; let side=visual(s.visual);
 if(s.type==='hero') main=`<div><div class="sub">${esc(s.subtitle)}</div><h1>${esc(s.title)}</h1><p class="lead">${esc(s.eyebrow)}</p><div class="kicker">${esc(s.kicker)}</div></div>`;
 else if(s.type==='roadmap') main=`<div><h2>${esc(s.title)}</h2><div class="cardgrid">${s.items.map(it=>`<div class="card"><div class="num">${esc(it[0])}</div><b>${esc(it[1])}</b><span>${esc(it[2])}</span></div>`).join('')}</div></div>`;
 else if(s.type==='outcomes') main=`<div><h2>${esc(s.title)}</h2><p class="lead">${esc(s.lead)}</p>${choices(s.bullets)}<div class="prompt">${esc(s.footer)}</div></div>`;
 else if(s.type==='term') main=`<div><h2>${esc(s.title)}</h2>${s.lead?`<p class="lead">${esc(s.lead)}</p>`:''}<div class="termBox"><b>${esc(s.term)}</b><p>${esc(s.definition)}</p></div>${s.formula?`<div class="formula">${esc(s.formula)}</div>`:''}${s.examples?choices(s.examples):''}</div>`;
 else if(s.type==='compare') main=`<div><h2>${esc(s.title)}</h2>${s.question?`<p class="lead">${esc(s.question)}</p>`:''}${s.term?`<div class="termBox"><b>${esc(s.term)}</b><p>${esc(s.definition)}</p></div>`:''}<div class="splitCols"><div class="card"><b>${esc(s.leftTitle)}</b>${choices(s.left)}</div><div class="card"><b>${esc(s.rightTitle)}</b>${choices(s.right)}</div></div><div class="prompt">${esc(s.prompt||s.divider||'→')}</div></div>`;
 else if(s.type==='quiz') main=`<div><h2>${esc(s.title)}</h2>${s.question?`<p class="lead">${esc(s.question)}</p>`:''}${choices(s.choices)}${s.prompt?`<div class="prompt">${esc(s.prompt)}</div>`:''}</div>`;
 else if(s.type==='answer') main=`<div><h2>${esc(s.title)}</h2>${s.answer?`<div class="answerBox"><div class="big">${esc(s.answer)}</div><p>${esc(s.body)}</p></div>`:''}${s.steps?steps(s.steps):''}${s.cue?`<div class="prompt">${esc(s.cue)}</div>`:''}</div>`;
 else if(s.type==='section') return `<section class="slide" data-notes="Section transition. Pause and reset attention.">${top(s,i)}<div class="content sectionLayout"><div><div class="badge">${esc(s.eyebrow)}</div><div class="sectionTitle">${esc(s.title)}</div><p class="lead">${esc(s.subtitle)}</p></div><div class="visual">${side}</div></div><div class="footer"><span>Cambridge IGCSE Economics 0455</span><span>${esc(s.eyebrow)}</span></div></section>`;
 else if(s.type==='cards') main=`<div><h2>${esc(s.title)}</h2>${s.lead?`<p class="lead">${esc(s.lead)}</p>`:''}${cardGrid(s.cards)}${s.footer?`<div class="prompt">${esc(s.footer)}</div>`:''}</div>`;
 else if(s.type==='split') main=`<div><h2>${esc(s.title)}</h2><div class="splitCols"><div class="card"><b>${esc(s.leftTitle)}</b><ul class="clean">${s.left.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div><div class="card"><b>${esc(s.rightTitle)}</b><ul class="clean">${s.right.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div></div></div>`;
 else if(s.type==='flow') main=`<div><h2>${esc(s.title)}</h2>${s.question?`<p class="lead">${esc(s.question)}</p>`:''}${flow(s.nodes)}${s.prompt?`<div class="prompt">${esc(s.prompt)}</div>`:''}${s.footer?`<div class="prompt">${esc(s.footer)}</div>`:''}</div>`;
 else if(s.type==='exam') main=`<div><h2>${esc(s.title)}</h2><p class="lead">${esc(s.question)}</p><div class="cardgrid">${s.keywords.map(k=>`<div class="card"><b>${esc(k)}</b><span>required link in the chain</span></div>`).join('')}</div><div class="prompt">${esc(s.prompt)}</div></div>`;
 return `<section class="slide" data-notes="Teacher move: ask students to explain the mechanism before revealing any answer.">${top(s,i)}<div class="content"><main>${main}</main><aside class="visual">${side}</aside></div><div class="footer"><span>Fiscal policy: taxation and fiscal policy</span><span>${esc(s.eyebrow||'')}</span></div></section>`;
}
deck.innerHTML = slides.map(renderSlide).join('');
const els=[...document.querySelectorAll('.slide')];
function show(n){ idx=Math.max(0,Math.min(slides.length-1,n)); els.forEach((el,i)=>el.classList.toggle('active',i===idx)); document.querySelector('#progress span').style.width=((idx+1)/slides.length*100)+'%'; notes.textContent=els[idx].dataset.notes||''; location.hash=String(idx+1); }
function overview(){ const labels=slides.map((s,i)=>`${i+1}. ${s.title.replace(/\n/g,' ')}`).join('\n'); alert(labels); }
document.addEventListener('keydown',e=>{ if(['ArrowRight','PageDown',' '].includes(e.key)) show(idx+1); if(['ArrowLeft','PageUp'].includes(e.key)) show(idx-1); if(e.key==='Home') show(0); if(e.key==='End') show(slides.length-1); if(e.key.toLowerCase()==='n') notes.classList.toggle('show'); if(e.key.toLowerCase()==='o') overview(); if(e.key.toLowerCase()==='f') document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen(); });
deck.addEventListener('click',()=>show(idx+1));
const start=parseInt(location.hash.replace('#',''),10); show(Number.isFinite(start)?start-1:0);
</script>
